<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Enbisso Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .bento-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; overflow: hidden; }
        .hover-glow:hover { border-color: #333; background: #111; transition: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-6xl mx-auto">

    <script>
        const DATA = {
            logo_url: "https://via.placeholder.com/100", // Your Logo/Headshot
            hero_video: "https://www.w3schools.com/html/mov_bbb.mp4", // Main Background Video
            
            // Project 1
            p1_title: "Distributed API Gateway",
            p1_desc: "Built with Go and Redis for ultra-low latency.",
            p1_image: "https://via.placeholder.com/800x400", 
            
            // Project 2
            p2_title: "Auth Microservice",
            p2_desc: "OAuth2/OIDC implementation.",
            p2_image: "https://via.placeholder.com/400x400",

            // Socials
            github: "https://github.com/yourusername",
            linkedin: "https://linkedin.com/in/yourusername"
        };
    </script>

    <header class="flex justify-between items-center mb-8">
        <img id="logo" src="" class="h-10 w-10 rounded-full bg-white" alt="Logo">
        <div class="flex gap-6 text-xs font-bold tracking-widest text-gray-500">
            <a id="gh-link" href="#" class="hover:text-white">GITHUB</a>
            <a id="li-link" href="#" class="hover:text-white">LINKEDIN</a>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <div class="md:col-span-3 bento-card relative aspect-video md:aspect-[21/9]">
            <video id="v-hero" autoplay muted loop playsinline class="w-full h-full object-cover opacity-50">
                <source src="" type="video/mp4">
            </video>
            <div class="absolute inset-0 p-8 flex flex-col justify-end">
                <h1 class="text-4xl md:text-6xl font-black tracking-tighter">BACKEND SPECIALIST</h1>
                <p class="text-gray-400 mt-2 font-medium">Building high-performance infrastructure.</p>
            </div>
        </div>

        <div class="md:col-span-2 bento-card hover-glow">
            <img id="img-p1" src="" class="w-full h-64 object-cover opacity-80">
            <div class="p-6">
                <h2 id="txt-p1-title" class="text-2xl font-bold"></h2>
                <p id="txt-p1-desc" class="text-gray-500"></p>
            </div>
        </div>

        <div class="bento-card p-8 flex flex-col justify-between hover-glow">
            <div class="text-gray-800 text-5xl font-black">01</div>
            <div>
                <h3 class="font-bold text-lg mb-2">TECH STACK</h3>
                <div class="flex flex-wrap gap-2 text-[10px] font-mono text-gray-400">
                    <span class="border border-gray-800 px-2 py-1 rounded">NODE.JS</span>
                    <span class="border border-gray-800 px-2 py-1 rounded">POSTGRES</span>
                    <span class="border border-gray-800 px-2 py-1 rounded">DOCKER</span>
                </div>
            </div>
        </div>

        <div class="bento-card hover-glow">
            <img id="img-p2" src="" class="w-full h-48 object-cover opacity-80">
            <div class="p-6">
                <h2 id="txt-p2-title" class="text-xl font-bold"></h2>
                <p id="txt-p2-desc" class="text-gray-500 text-sm"></p>
            </div>
        </div>

        <div class="md:col-span-2 bento-card p-8 flex justify-between items-center bg-white text-black">
            <div>
                <h2 class="text-2xl font-black italic">LET'S BUILD</h2>
                <p class="font-medium opacity-70">Available for 2026 roles.</p>
            </div>
            <div class="text-3xl">→</div>
        </div>

    </div>

    <script>
        document.getElementById('logo').src = DATA.logo_url;
        document.getElementById('v-hero').querySelector('source').src = DATA.hero_video;
        document.getElementById('v-hero').load();
        
        document.getElementById('img-p1').src = DATA.p1_image;
        document.getElementById('txt-p1-title').innerText = DATA.p1_title;
        document.getElementById('txt-p1-desc').innerText = DATA.p1_desc;
        
        document.getElementById('img-p2').src = DATA.p2_image;
        document.getElementById('txt-p2-title').innerText = DATA.p2_title;
        document.getElementById('txt-p2-desc').innerText = DATA.p2_desc;

        document.getElementById('gh-link').href = DATA.github;
        document.getElementById('li-link').href = DATA.linkedin;
    </script>
</body>
</html>
