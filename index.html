<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Premium Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <video autoplay muted loop playsinline class="absolute z-0 w-auto min-w-full min-height-full max-w-none opacity-40">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-digital-network-background-30043-large.mp4" type="video/mp4">
    </video>

    <main class="relative z-10 flex flex-col items-center justify-center h-screen px-6">
        <div class="glass p-10 rounded-2xl max-w-2xl w-full text-center">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-4 italic">
                YOUR NAME
            </h1>
            <p class="text-gray-400 text-lg mb-8 tracking-widest uppercase">
                Backend Architect • Systems Engineer
            </p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                <div class="glass p-4 rounded-lg">
                    <span class="text-xs text-blue-400 uppercase font-bold">Status</span>
                    <p class="text-sm">Available for Projects</p>
                </div>
                <div class="glass p-4 rounded-lg">
                    <span class="text-xs text-blue-400 uppercase font-bold">Location</span>
                    <p class="text-sm">Remote / Global</p>
                </div>
            </div>

            <a href="mailto:your@email.com" class="inline-block mt-8 px-8 py-3 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition">
                GET IN TOUCH
            </a>
        </div>
    </main>

</body>
</html>
